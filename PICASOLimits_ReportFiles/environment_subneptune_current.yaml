name: subneptune
# Exported from the working subneptune conda env (linux-64 / WSL2, June 2026)
# Installs via: conda env create -f environment_subneptune_current.yaml
# After install, follow setup_automated.sh to download picaso reference data
# and star spectra (picasofiles/ directory + PYSYN_CDBS).

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ─────────────────────────────────────────────────────────────────
  - python=3.12.12

  # ── Core science stack ─────────────────────────────────────────────────────
  - numpy=1.26.4
  - scipy=1.11.4
  - pandas=2.2.3
  - matplotlib=3.10.8
  - xarray=2024.9.0
  - numba=0.60.0
  - h5py=3.15.1
  - h5netcdf=1.8.0
  - netcdf4

  # ── Atmospheric modeling ───────────────────────────────────────────────────
  - photochem=0.8.4
  - photochem_clima_data=0.3.1

  # ── Astronomy / photometry ─────────────────────────────────────────────────
  - astropy=6.1.4
  - astroquery=0.4.11
  - stsynphot=1.5.1          # HST/STScI synthetic photometry (replaces synphot)
  - synphot=1.7.0
  - photutils=2.3.0

  # ── Statistics / retrieval ─────────────────────────────────────────────────
  - pymultinest=2.12
  - multinest=3.10
  - corner=2.2.3
  - arviz=0.23.1

  # ── Parallelism / MPI ─────────────────────────────────────────────────────
  - mpi4py=4.0.1
  - mpich=4.3.2
  - dill=0.3.9
  - threadpoolctl=3.6.0

  # ── Jupyter / viz ─────────────────────────────────────────────────────────
  - jupyter=1.1.1
  - jupyterlab=4.5.3
  - ipywidgets=8.1.8
  - bokeh=3.8.2
  - ipykernel=7.1.0

  # ── Web / data fetching ────────────────────────────────────────────────────
  - requests=2.32.5
  - beautifulsoup4=4.14.3
  - astroquery=0.4.11
  - wget=1.25.0

  # ── Build tools (needed to compile photochem / picaso extensions) ──────────
  - cmake=3.31.8
  - ninja=1.13.1
  - cython=3.1.6
  - fypp=3.2
  - scikit-build=0.18.1
  - c-compiler=1.11.0
  - cxx-compiler=1.11.0
  - fortran-compiler=1.11.0

  # ── Misc utilities ─────────────────────────────────────────────────────────
  - tqdm=4.66.5
  - git=2.51.0
  - tar=1.35
  - unzip=6.0
  - pip=25.2

  # ── pip-only packages ──────────────────────────────────────────────────────
  # picaso: Nicholas Wogan's fork, specific commit used to build the grid
  # (the published picaso 4.0.1 on PyPI has a different inputs_climate API, whereas this version is just picaso 4.0)
  - pip:
    - https://github.com/Nicholaswogan/picaso/archive/1abab282f0fa8a7ca6c7ddb330cbcfdc08d75f37.zip
    - virga-exo==1.0
    - bibtexparser==1.4.3
    - miepython==3.0.5
    - pooch==1.8.2
    - joblib==1.5.3
